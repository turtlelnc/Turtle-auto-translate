<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自动翻译助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      padding: 20px;
      font-family: 'Segoe UI', 'Microsoft YaHei', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 20px;
      color: #667eea;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 600;
    }

    .setting-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    select:focus, input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .toggle-label {
      font-size: 14px;
      font-weight: 600;
      color: #555;
    }

    .toggle-switch {
      position: relative;
      width: 50px;
      height: 26px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 26px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #667eea;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #666;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .api-key-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .api-key-section label {
      font-size: 12px;
      color: #777;
    }

    .free-badge {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 4px;
      vertical-align: middle;
    }

    .info-text {
      font-size: 12px;
      color: #999;
      margin-top: 15px;
      text-align: center;
      line-height: 1.5;
    }

    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .status-active {
      background: #4CAF50;
    }

    .status-inactive {
      background: #f44336;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌐 自动翻译助手</h1>

    <div class="toggle-container">
      <span class="toggle-label">
        <span class="status-indicator status-active" id="statusIndicator"></span>
        启用自动翻译
      </span>
      <label class="toggle-switch">
        <input type="checkbox" id="enableToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="setting-group">
      <label for="translatorSelect">翻译服务</label>
      <select id="translatorSelect">
        <option value="google">谷歌翻译 ✓ 免费</option>
        <option value="mymemory">MyMemory ✓ 免费</option>
        <option value="libretranslate">LibreTranslate ✓ 免费</option>
        <option value="bing">微软必应（需API密钥）</option>
        <option value="baidu">百度翻译（需API密钥）</option>
        <option value="deepl">DeepL（需API密钥）</option>
        <option value="ai">AI翻译 / OpenAI（需API密钥）</option>
      </select>
    </div>

    <div class="setting-group">
      <label for="domainInput">自动翻译域名 <span style="font-weight:400;color:#aaa;">（可选，按回车添加）</span></label>
      <input type="text" id="domainInput" placeholder="例如：example.com">
    </div>

    <button class="btn btn-primary" id="translateBtn">立即翻译此页</button>
    <button class="btn btn-secondary" id="restoreBtn">还原原始内容</button>

    <div class="api-key-section">
      <div class="setting-group">
        <label for="deeplKey">DeepL API 密钥 <span style="font-weight:400;color:#aaa;">（可选）</span></label>
        <input type="text" id="deeplKey" placeholder="输入 DeepL API 密钥">
      </div>

      <div class="setting-group">
        <label for="openaiKey">OpenAI API 密钥 <span style="font-weight:400;color:#aaa;">（可选）</span></label>
        <input type="text" id="openaiKey" placeholder="输入 OpenAI API 密钥">
      </div>
    </div>

    <p class="info-text">
      翻译方向：英文 → 中文<br>
      免费服务：谷歌翻译、MyMemory、LibreTranslate<br>
      付费服务：必应、百度、DeepL、AI翻译
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
